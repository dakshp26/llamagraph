services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "127.0.0.1:8000:8000"
    restart: unless-stopped
    environment:
      OLLAMA_HOST: http://host.docker.internal:11434
    volumes:
      - ./backend/files:/app/backend/files

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "127.0.0.1:3000:3000"
    restart: unless-stopped
    depends_on:
      - backend
